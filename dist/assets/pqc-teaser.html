function computeTotals() {
  let total = 0, done = 0, wip = 0;
  for (const dim of DIMENSIONS) dim.tiers.forEach((items, ti) => items.forEach((_, ii) => {

  return { total, done, wip, pct: total ? Math.round(done / total * 100) : 0 };
}

/* Phase / Dependency view — uses real computePhases() + real DEPS */
function computePhases() {
  const incoming = {};
  for (const dim of DIMENSIONS)
    dim.tiers.forEach((items, ti) =>
      items.forEach((_, ii) => { incoming[keyOf(dim.id, ti, ii)] = []; }));
  for (const d of DEPS)
    if (incoming[d.to] !== undefined) incoming[d.to].push(d.from);
  const memo = {};
  function p(k) {
    if (k in memo) return memo[k];
    const ins = incoming[k];
    return (memo[k] = ins && ins.length ? 1 + Math.max(...ins.map(p)) : 0);
  }
  const out = {};
  for (const k of Object.keys(incoming)) out[k] = p(k);
  return out;
}

function renderPhaseView() {
  const phases = computePhases();
  const byPhase = {};
  let maxPhase = 0;
  for (const dim of DIMENSIONS) {
    dim.tiers.forEach((items, ti) => {
      items.forEach((item, ii) => {
        const key = keyOf(dim.id, ti, ii);
        const ph  = phases[key] ?? 0;
        if (ph > maxPhase) maxPhase = ph;
        (byPhase[ph] = byPhase[ph] || []).push({ key, dim, ti, ii, item });
      });
    });
  }

  const pos = {};
  for (let ph = 0; ph <= maxPhase; ph++) {
    const group = byPhase[ph] || [];
    if (ph > 0) {
      group.sort((a, b) => {
        const bary = n => {
          const ins = DEPS.filter(d => d.to === n.key).map(d => pos[d.from] ?? 0);
          return ins.length ? ins.reduce((s,x)=>s+x,0)/ins.length : 0;
        };
        return bary(a) - bary(b);
      });
    }
    group.forEach((n,i) => { pos[n.key] = i; });
  }

  const rows = Array.from({length: maxPhase+1}, (_,ph) => {
    const group = byPhase[ph] || [];
    const cards = group.map(({key,dim,ti,item}) => {
      const a = ACCENT[dim.accent]||ACCENT.amber;
      const r = a.raw;
      const tierName = TIERS[ti]?.name ?? `Tier ${ti}`;
      const stIco = state.statuses[key]||"todo";
      const isDoneIco = stIco==="done", isWipIco = stIco==="wip";
      const icoColor = isDoneIco?"rgb(52,211,153)":isWipIco?"rgb(251,191,36)":"rgb(120,113,108)";
      const icoSvg   = isDoneIco?ICONS.checkCircle:isWipIco?ICONS.circleDot:ICONS.circle;
      const titleXtra= isDoneIco?"text-decoration:line-through;opacity:0.5;":"";
      return `
        <div data-card="${key}"
             style="border-left:3px solid rgba(${r},0.75);background:rgba(${r},0.06);
                    border-radius:6px;padding:10px 13px;min-width:220px;max-width:220px;flex-shrink:0;transition:opacity 0.15s;">
          <div style="display:flex;align-items:flex-start;gap:6px;">
            <span class="item-icon" style="flex-shrink:0;width:14px;height:14px;margin-top:2px;color:${icoColor};">${icoSvg}</span>
            <div style="flex:1;min-width:0;font-size:12.5px;line-height:1.4;color:rgb(220,210,200);word-break:break-word;">
              <span class="item-title-blur" style="${titleXtra}">${escapeHtml(item.title)}</span>
            </div>
          </div>
          <div style="font-family:'JetBrains Mono',monospace;font-size:8px;color:rgba(${r},0.55);margin-top:5px;letter-spacing:.07em;text-transform:uppercase;display:flex;gap:6px;">
            <span>${escapeHtml(dim.name)}</span><span style="opacity:0.4;">·</span><span>${escapeHtml(tierName)}</span>
          </div>
        </div>`;
    }).join("");

    return `
      <div style="display:flex;align-items:flex-start;margin-bottom:100px;">
        <div style="flex-shrink:0;width:44px;padding-top:12px;">
          <div style="font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.1em;color:rgb(120,113,108);text-align:right;padding-right:12px;">t=${ph}</div>
        </div>
        <div style="flex:1;min-width:0;">
          <div style="display:flex;flex-wrap:wrap;gap:10px;">${cards}</div>
        </div>
      </div>`;
  }).join("");

  const showArrows = state.showArrows;
  const bBase   = "inline-flex items-center gap-1.5 font-mono text-[11px] px-2.5 py-1 rounded border transition";
  const bActive = `${bBase} bg-stone-800 border-stone-600 text-stone-100`;
  const bIdle   = `${bBase} border-stone-800 text-stone-500 hover:text-stone-300 hover:border-stone-700`;
  const legend  = DIMENSIONS.map(dim => {
    const a = ACCENT[dim.accent]||ACCENT.amber;
    return `<span class="flex items-center gap-1.5 font-mono text-[10px]">
      <span style="width:9px;height:9px;border-radius:2px;background:rgba(${a.raw},0.65);flex-shrink:0;display:inline-block;"></span>
      <span class="${a.text}">${escapeHtml(dim.name)}</span></span>`;
  }).join("");

  return `
    <div class="mb-4 flex flex-wrap items-center gap-x-4 gap-y-2">
      ${legend}
      <button id="toggleArrowsBtn" type="button" class="${showArrows ? bActive : bIdle}" style="margin-left:auto;">
        <span style="display:inline-block;width:12px;height:12px;">${ICONS.gitBranch}</span>
        ${showArrows ? "Hide arrows" : "Show arrows"}
      </button>
      <span class="font-mono text-[10px] text-stone-600">click a card to highlight its connections</span>
    </div>
    <div id="phase-inner" style="position:relative;padding:8px 0;">
      ${rows}
    </div>`;
}

/* SVG Arrows — identical to original */
function drawSvgArrows() {
  const inner = document.getElementById("phase-inner");
  if (!inner) return;
  const old = inner.querySelector("#arrows-svg");
  if (old) old.remove();
  if (!state.showArrows && !state.depHighlight) return;

  const iRect = inner.getBoundingClientRect();
  const W = inner.scrollWidth, H = inner.scrollHeight;
  const svg = document.createElementNS("http://www.w3.org/2000/svg","svg");
  svg.id = "arrows-svg";
  svg.setAttribute("style",`position:absolute;top:0;left:0;width:${W}px;height:${H}px;pointer-events:none;overflow:visible;opacity:${state.showArrows?1:0};transition:opacity 0.2s;`);

  const defs = document.createElementNS("http://www.w3.org/2000/svg","defs");
  for (const dim of DIMENSIONS) {
    const raw = (ACCENT[dim.accent]||ACCENT.amber).raw;
    for (const [sfx,alpha] of [["",0.5],["-hl",1]]) {
      const m = document.createElementNS("http://www.w3.org/2000/svg","marker");
      m.setAttribute("id",`arr${sfx}-${dim.id}`);
      m.setAttribute("markerWidth","7"); m.setAttribute("markerHeight","7");
      m.setAttribute("refX","5");       m.setAttribute("refY","2.5");
      m.setAttribute("orient","auto");  m.setAttribute("markerUnits","strokeWidth");
      const p = document.createElementNS("http://www.w3.org/2000/svg","path");
      p.setAttribute("d","M0,0 L0,5 L7,2.5 z");
      p.setAttribute("fill",`rgba(${raw},${alpha})`);
      m.appendChild(p); defs.appendChild(m);
    }
  }
  svg.appendChild(defs);

  for (const dep of DEPS) {
    const fEl = inner.querySelector(`[data-card="${dep.from}"]`);
    const tEl = inner.querySelector(`[data-card="${dep.to}"]`);
    if (!fEl || !tEl) continue;
    const fR = fEl.getBoundingClientRect(), tR = tEl.getBoundingClientRect();
    if (tR.top <= fR.bottom + 4) continue;
    const fx = fR.left - iRect.left + fR.width/2;
    const fy = fR.bottom - iRect.top;
    const tx = tR.left - iRect.left + tR.width/2;
    const ty = tR.top  - iRect.top;
    const cy = (fy+ty)/2;
    const dimId   = dep.from.split(":")[0];
    const fromDim = DIMENSIONS.find(d => d.id === dimId);
    const raw     = fromDim ? (ACCENT[fromDim.accent]?.raw ?? "148,163,184") : "148,163,184";
    const path = document.createElementNS("http://www.w3.org/2000/svg","path");
    path.setAttribute("data-efrom", dep.from);
    path.setAttribute("data-eto",   dep.to);
    path.setAttribute("d",`M ${fx} ${fy} C ${fx} ${cy}, ${tx} ${cy}, ${tx} ${ty}`);
    path.setAttribute("stroke",`rgba(${raw},0.38)`);
    path.setAttribute("stroke-width","1.5");
    path.setAttribute("fill","none");
    path.setAttribute("stroke-dasharray","6 4");
    path.setAttribute("marker-end",`url(#arr-${dimId})`);
    svg.appendChild(path);
  }
  inner.appendChild(svg);
  if (state.depHighlight) applyDepHighlight(state.depHighlight);
}

function applyDepHighlight(key) {
  const inner = document.getElementById("phase-inner");
  if (!inner) return;
  const connected = new Set([key]);
  for (const dep of DEPS) {
    if (dep.from === key) connected.add(dep.to);
    if (dep.to   === key) connected.add(dep.from);
  }
  inner.querySelectorAll("[data-card]").forEach(el => {
    el.style.opacity = connected.has(el.getAttribute("data-card")) ? "1" : "0.15";
  });
  inner.querySelectorAll("[data-efrom]").forEach(path => {
    const f=path.getAttribute("data-efrom"), t=path.getAttribute("data-eto");
    const hit = f===key || t===key;
    const dimId = f.split(":")[0];
    const raw = (ACCENT[(DIMENSIONS.find(d=>d.id===dimId)||{}).accent]?.raw)||"148,163,184";
    if (hit) {
      path.setAttribute("stroke",`rgba(${raw},1)`);
      path.setAttribute("stroke-width","2.5");
      path.setAttribute("stroke-dasharray","none");
      path.setAttribute("marker-end",`url(#arr-hl-${dimId})`);
    } else {
      path.setAttribute("stroke","rgba(0,0,0,0)");
    }
  });
}

function clearDepHighlight() {
  const inner = document.getElementById("phase-inner");
  if (!inner) return;
  inner.querySelectorAll("[data-card]").forEach(el => el.style.opacity="1");
  inner.querySelectorAll("[data-efrom]").forEach(path => {
    const dimId = path.getAttribute("data-efrom").split(":")[0];
    const raw = (ACCENT[(DIMENSIONS.find(d=>d.id===dimId)||{}).accent]?.raw)||"148,163,184";
    path.setAttribute("stroke",`rgba(${raw},0.38)`);
    path.setAttribute("stroke-width","1.5");
    path.setAttribute("stroke-dasharray","6 4");
    path.setAttribute("marker-end",`url(#arr-${dimId})`);
  });
}

function attachHandlers() {
  const phaseInner = document.getElementById("phase-inner");
  if (phaseInner) {
    phaseInner.addEventListener("click", e => {
      const card = e.target.closest("[data-card]");
      if (!card) return;
      const key = card.getAttribute("data-card");
      if (state.depHighlight === key) { state.depHighlight = null; clearDepHighlight(); }
      else { state.depHighlight = key; applyDepHighlight(key); }
    });
  }
  const toggleArrows = document.getElementById("toggleArrowsBtn");
  if (toggleArrows) toggleArrows.addEventListener("click", () => {
    state.showArrows = !state.showArrows;
    const svg = document.getElementById("arrows-svg");
    if (svg) { svg.style.opacity = state.showArrows ? "1" : "0"; }
    else if (state.showArrows) { drawSvgArrows(); }
    render();
  });
  const tierBtn  = document.getElementById("viewTierBtn");
  const phaseBtn = document.getElementById("viewPhaseBtn");
  if (tierBtn)  tierBtn.addEventListener("click",  () => { stopAuto(); state.view="tier";  state.depHighlight=null; render(); startAuto(); });
  if (phaseBtn) phaseBtn.addEventListener("click", () => { stopAuto(); state.view="phase"; state.depHighlight=null; render(); startAuto(); });
}

// ─── Demo sequence ──────────────────────────────────────────────────────────
// Items used: discovery:0:0..3, agility:0:0..2, pqc:0:0..1
// Steps show: tier view → dep map → arrows on → card click/highlight →
//             completing items (icons change, progress updates, arrows solid)
const DEMO_ITEMS = [
  "discovery:0:0","discovery:0:1","discovery:0:2","discovery:0:3",
  "agility:0:0","agility:0:1","agility:0:2",
  "pqc:0:0","pqc:0:1",
];
const DEMO_HIGHLIGHT = ["discovery:0:0","agility:0:1","pqc:0:1"];

let demoTimer = null;
let demoUserPaused = false;

function stopDemo() {
  if (demoTimer) { clearTimeout(demoTimer); demoTimer = null; }
}

function runDemoFrom(step) {
  stopDemo();
  if (demoUserPaused) return;

  function after(ms, fn) { demoTimer = setTimeout(fn, ms); }

  const nItems = DEMO_ITEMS.length;
  const nHL    = DEMO_HIGHLIGHT.length;

  if (step === 0) {
    // Reset — tier view, all todo
    DEMO_ITEMS.forEach(k => { state.statuses[k] = "todo"; });
    state.view = "tier"; state.showArrows = false; state.depHighlight = null;
    render();
    after(3500, () => runDemoFrom(1));

  } else if (step === 1) {
    // Switch to dep map (arrows hidden)
    state.view = "phase"; state.showArrows = false; state.depHighlight = null;
    render();
    after(2200, () => runDemoFrom(2));

  } else if (step === 2) {
    // Toggle arrows on
    state.showArrows = true;
    drawSvgArrows();
    // Update button appearance by re-rendering
    const btn = document.getElementById("toggleArrowsBtn");
    if (btn) btn.classList.replace("text-stone-500","text-teal-300");
    after(2200, () => runDemoFrom(10));  // 10 = first highlight step

  } else if (step >= 10 && step < 10 + nHL) {
    // Click highlight steps
    const hlKey = DEMO_HIGHLIGHT[step - 10];
    state.depHighlight = hlKey;
    applyDepHighlight(hlKey);
    // Pulse the highlighted card visually
    const card = document.querySelector(`[data-card="${hlKey}"]`);
    if (card) {
      card.style.transition = "box-shadow 0.3s";
      card.style.boxShadow = "0 0 0 2px rgba(45,212,191,0.6)";
      after(300, () => { if(card) card.style.boxShadow = ""; });
    }
    after(2400, () => {
      clearDepHighlight();
      state.depHighlight = null;
      after(500, () => runDemoFrom(step + 1 < 10 + nHL ? step + 1 : 20));
    });

  } else if (step === 20) {
    // Start completing items
    state.depHighlight = null;
    runDemoFrom(30);

  } else if (step >= 30 && step < 30 + nItems) {
    // Complete items one by one
    const key = DEMO_ITEMS[step - 30];
    state.statuses[key] = "done";
    // Partial re-render: update just the item icon + progress card without full re-render
    // (avoids scroll reset; falls back to full render if needed)
    _updateItemIcon(key);
    _updateProgressCard();
    // Refresh arrows so completed ones go solid
    if (state.view === "phase") {
      clearDepHighlight(); // repaints arrows with current statuses
    }
    after(1400, () => runDemoFrom(step + 1));

  } else if (step === 30 + nItems) {
    // All demo items done — pause, then switch back to tier view to show results
    after(1200, () => {
      state.view = "tier"; state.depHighlight = null;
      render();
      after(3500, () => runDemoFrom(0));
    });

  } else {
    // Fallback
    after(3000, () => runDemoFrom(0));
  }
}

function _updateItemIcon(key) {
  // Update a single item's icon and strike-through without full re-render
  const parts = key.split(":");
  const dimId = parts[0], ti = parseInt(parts[1]), ii = parseInt(parts[2]);
  const dim = DIMENSIONS.find(d => d.id === dimId);
  if (!dim) return;
  const item = (dim.tiers[ti] || [])[ii];
  if (!item) return;
  // Find the rendered item by searching for its title text in a rendered container
  // We re-render just this item's container span if possible
  // Fallback: full render (unlikely to be needed given the data-card attributes)
  if (state.view === "phase") {
    const card = document.querySelector(`[data-card="${key}"]`);
    if (card) {
      const iconSpan = card.querySelector(".item-icon");
      const titleSpan = card.querySelector(".item-title-blur");
      const status = state.statuses[key] || "todo";
      if (iconSpan) {
        const isDone = status === "done", isWip = status === "wip";
        iconSpan.style.color = isDone ? "rgb(52,211,153)" : isWip ? "rgb(251,191,36)" : "rgb(120,113,108)";
        iconSpan.innerHTML = isDone ? ICONS.checkCircle : isWip ? ICONS.circleDot : ICONS.circle;
      }
      if (titleSpan) {
        titleSpan.style.textDecoration = status === "done" ? "line-through" : "";
        titleSpan.style.opacity = status === "done" ? "0.5" : "";
      }
      return;
    }
  }
  // Tier view — full render needed to show updated icon
  render();
}

function _updateProgressCard() {
  const totals = computeTotals();
  const pTheme = progressTheme(totals.pct);
  const card = document.querySelector(".progress-card");
  if (!card) { render(); return; }
  const numEl  = card.querySelector(".progress-number");
  const doneEl = card.querySelector(".progress-done");
  const wipEl  = card.querySelector(".progress-wip");
  const barEl  = card.querySelector(".progress-bar");
  const lblEl  = card.querySelector(".progress-label");
  if (numEl)  numEl.textContent  = totals.pct + "%";
  if (doneEl) doneEl.textContent = totals.done;
  if (wipEl)  wipEl.textContent  = totals.wip + " in progress";
  if (barEl)  barEl.style.width  = totals.pct + "%";
  if (lblEl)  lblEl.textContent  = pTheme.label;
}

// Pause demo on user interaction, resume after 15 s
document.addEventListener("click", () => {
  if (!demoUserPaused) {
    demoUserPaused = true;
    stopDemo();
    demoTimer = setTimeout(() => { demoUserPaused = false; runDemoFrom(0); }, 15000);
  }
}, { capture: true });

render();
runDemoFrom(0);
</script>
