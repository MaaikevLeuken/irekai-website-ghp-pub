<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="description" content="IREKAI — Post-quantum cryptography consulting, assessments, and tools."/>
<title>IREKAI — Post-Quantum Security</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,700;1,9..144,400;1,9..144,500&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<!-- Vue 3 + Vue Router via CDN (loaded by your browser, not this server) -->
<script src="https://unpkg.com/vue@3.4.21/dist/vue.global.prod.js"></script>
<script src="https://unpkg.com/vue-router@4.3.0/dist/vue-router.global.prod.js"></script>
<style>
/* ─── Design System ─────────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0c0a09;--surface:#1c1917;--surface2:#292524;
  --border:rgba(41,37,36,0.9);--border-dim:rgba(41,37,36,0.5);
  --text:#e7e5e4;--text-muted:#a8a29e;--text-dim:#78716c;
  --teal:#2dd4bf;--teal-soft:rgba(45,212,191,0.08);--teal-glow:rgba(45,212,191,0.35);
  --sage:#7aad97;--sage-soft:rgba(122,173,151,0.08);
  --amber:#fbbf24;--violet:#a78bfa;--fuchsia:#e879f9;--emerald:#34d399;
  --fd:'Fraunces',Georgia,serif;--fg:'Cormorant Garamond',Georgia,serif;--fm:'JetBrains Mono',monospace;--fs:ui-sans-serif,system-ui,sans-serif;
}
html{scroll-behavior:smooth;font-size:16px}
body{background:var(--bg);color:var(--text);font-family:var(--fs);min-height:100vh;-webkit-font-smoothing:antialiased}
.grid-bg{background-image:radial-gradient(circle at 1px 1px,rgba(231,229,228,0.055) 1px,transparent 0);background-size:22px 22px}
.fd{font-family:var(--fd)} .fm{font-family:var(--fm)}
.container{max-width:1180px;margin:0 auto;padding:0 1.5rem}
@media(min-width:768px){.container{padding:0 2.5rem}}
a{color:inherit;text-decoration:none}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--surface2);border-radius:3px}

/* ── Buttons ── */
.btn{display:inline-flex;align-items:center;gap:.5rem;font-family:var(--fm);font-size:.75rem;letter-spacing:.04em;padding:.6rem 1.2rem;border-radius:6px;border:1px solid;cursor:pointer;transition:all .2s;text-decoration:none}
.btn-teal{background:rgba(45,212,191,.1);border-color:rgba(45,212,191,.4);color:var(--teal)}
.btn-teal:hover{background:rgba(45,212,191,.18);border-color:rgba(45,212,191,.7);box-shadow:0 0 20px -5px var(--teal-glow)}
.btn-sage{background:rgba(122,173,151,.1);border-color:rgba(122,173,151,.4);color:#7aad97}
.btn-sage:hover{background:rgba(122,173,151,.18);border-color:rgba(122,173,151,.7);box-shadow:0 0 18px -5px rgba(122,173,151,.4)}
.btn-ghost{background:transparent;border-color:var(--border);color:var(--text-muted)}
.btn-ghost:hover{border-color:var(--text-dim);color:var(--text)}

/* ── Badge ── */
.badge{display:inline-flex;align-items:center;font-family:var(--fm);font-size:.62rem;letter-spacing:.15em;text-transform:uppercase;padding:.22rem .6rem;border-radius:4px;border:1px solid}
.badge-teal{background:rgba(45,212,191,.1);color:var(--teal);border-color:rgba(45,212,191,.3)}
.badge-amber{background:rgba(251,191,36,.1);color:var(--amber);border-color:rgba(251,191,36,.3)}
.badge-violet{background:rgba(167,139,250,.1);color:var(--violet);border-color:rgba(167,139,250,.3)}
.badge-fuchsia{background:rgba(232,121,249,.1);color:var(--fuchsia);border-color:rgba(232,121,249,.3)}

.section-label{font-family:var(--fm);font-size:.62rem;letter-spacing:.25em;text-transform:uppercase;color:var(--text-dim)}

/* ── Navbar ── */
#navbar{position:sticky;top:0;z-index:100;transition:background .2s,border-color .2s,backdrop-filter .2s;border-bottom:1px solid transparent}
#navbar.scrolled{background:rgba(12,10,9,.88);backdrop-filter:blur(12px);border-bottom-color:var(--border)}
.nav-inner{display:flex;align-items:center;justify-content:space-between;height:60px}
.nav-logo{display:flex;align-items:center;gap:.6rem}
.nav-logo svg{width:26px;height:26px}
.nav-logo-name{font-family:var(--fd);font-size:1rem;letter-spacing:.18em;color:var(--text)}
.nav-links{display:none;align-items:center;gap:.2rem}
@media(min-width:768px){.nav-links{display:flex}}
.nav-link{font-family:var(--fm);font-size:.72rem;letter-spacing:.04em;color:var(--text-muted);padding:.38rem .7rem;border-radius:6px;background:transparent;border:none;cursor:pointer;transition:color .15s,background .15s;text-decoration:none}
.nav-link:hover,.nav-link.active{color:var(--text);background:rgba(255,255,255,.05)}
.nav-cta{margin-left:.4rem}
/* dropdown */
.nav-dd{position:relative}
.dd-trigger{display:flex;align-items:center;gap:.3rem}
.dd-menu{position:absolute;top:calc(100% + 8px);left:50%;transform:translateX(-50%) translateY(-4px);min-width:260px;background:#1a1714;border:1px solid var(--border);border-radius:10px;padding:.35rem;box-shadow:0 16px 48px rgba(0,0,0,.5);opacity:0;visibility:hidden;transition:opacity .15s,transform .15s}
.dd-menu.open{opacity:1;visibility:visible;transform:translateX(-50%) translateY(0)}
.dd-chevron{width:10px;height:10px;transition:transform .2s}
.dd-chevron.open{transform:rotate(180deg)}
.dd-item{display:flex;align-items:center;gap:.6rem;padding:.5rem .7rem;border-radius:6px;font-family:var(--fm);font-size:.7rem;color:var(--text-muted);transition:background .15s,color .15s;cursor:pointer;border:none;background:transparent;width:100%;text-align:left}
.dd-item:hover{background:rgba(255,255,255,.06);color:var(--text)}
.dd-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
/* burger */
.burger{display:flex;flex-direction:column;justify-content:space-between;width:22px;height:14px;background:transparent;border:none;cursor:pointer;padding:0}
@media(min-width:768px){.burger{display:none}}
.burger span{display:block;height:1.5px;background:var(--text-muted);border-radius:2px;transition:all .25s ease;transform-origin:center}
.burger.open span:nth-child(1){transform:translateY(6.25px) rotate(45deg)}
.burger.open span:nth-child(2){opacity:0;transform:scaleX(0)}
.burger.open span:nth-child(3){transform:translateY(-6.25px) rotate(-45deg)}
/* mobile menu */
.mobile-menu{display:none;flex-direction:column;padding:.75rem 1.5rem 1.25rem;border-bottom:1px solid var(--border);background:rgba(12,10,9,.97);backdrop-filter:blur(12px)}
.mobile-menu.open{display:flex}
@media(min-width:768px){.mobile-menu{display:none !important}}
.mob-label{font-family:var(--fm);font-size:.6rem;letter-spacing:.2em;text-transform:uppercase;color:var(--text-dim);margin:.25rem 0 .4rem}
.mob-link{font-family:var(--fm);font-size:.8rem;color:var(--text-muted);padding:.55rem .4rem;border-radius:6px;transition:color .15s;cursor:pointer;display:flex;align-items:center;gap:.5rem;border:none;background:transparent;width:100%;text-align:left}
.mob-link:hover{color:var(--text)}
.mob-link::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--border);flex-shrink:0}
.mob-link.teal-link{color:var(--teal)}
.mob-divider{border:none;border-top:1px solid var(--border);margin:.4rem 0}

/* ── Footer ── */
.site-footer{border-top:1px solid var(--border);margin-top:6rem}
.footer-inner{display:flex;flex-direction:column;gap:2.5rem;padding:3rem 0}
@media(min-width:640px){.footer-inner{flex-direction:row;justify-content:space-between;align-items:flex-start}}
.footer-brand{display:flex;flex-direction:column;gap:1rem}
.footer-logo-row{display:flex;align-items:center;gap:.6rem}
.footer-logo-row svg{width:24px;height:24px}
.footer-logo-name{font-family:var(--fd);font-size:.95rem;letter-spacing:.18em;color:var(--text)}
.footer-tagline{font-family:var(--fm);font-size:.68rem;line-height:1.6;color:var(--text-dim);letter-spacing:.04em}
.footer-nav{display:grid;grid-template-columns:1fr 1fr;gap:2rem}
.footer-nav-col{display:flex;flex-direction:column;gap:.55rem}
.footer-nav-label{font-family:var(--fm);font-size:.6rem;letter-spacing:.2em;text-transform:uppercase;color:var(--text-dim);margin-bottom:.2rem}
.footer-link{font-family:var(--fm);font-size:.7rem;color:var(--text-muted);transition:color .15s;cursor:pointer}
.footer-link:hover{color:var(--text)}
.footer-bottom{border-top:1px solid var(--border-dim);padding:1rem 0}
.footer-bottom-inner{display:flex;justify-content:space-between;align-items:center}
.footer-copy{font-family:var(--fm);font-size:.62rem;color:var(--text-dim);letter-spacing:.08em}

/* ── Page transition ── */
.v-enter-active,.v-leave-active{transition:opacity .22s ease,transform .22s ease}
.v-enter-from{opacity:0;transform:translateY(8px)}
.v-leave-to{opacity:0;transform:translateY(-4px)}

/* ══════════════════════════════════════════════════════════════
   HOME PAGE — IREMIA+IKIGAI → IREKAI animation (looping)
══════════════════════════════════════════════════════════════ */
.hero-section{min-height:100svh;display:flex;align-items:center;justify-content:center;padding:2rem 1.5rem;position:relative;overflow:hidden}
.hero-center{display:flex;flex-direction:column;align-items:center;gap:1.6rem;text-align:center;padding-top:210px;position:relative}
/* Seal */
.seal-area{position:absolute;top:8px;left:50%;transform:translateX(-50%) translateY(10px) scale(.88);opacity:0;transition:opacity .55s ease,transform .65s cubic-bezier(.2,0,.2,1)}
.seal-area.visible{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}
.seal-rect-outer{stroke-dasharray:576;stroke-dashoffset:576}
.seal-area.drawing .seal-rect-outer{animation:drawStroke 1.1s cubic-bezier(.4,0,.2,1) 0s forwards}
.seal-corners{opacity:0}
.seal-area.drawing .seal-corners{animation:fadeInEl .4s ease .9s forwards}
.seal-lattice{opacity:0}
.seal-area.drawing .seal-lattice{animation:fadeInEl .5s ease .85s forwards}
.seal-rect-inner{stroke-dasharray:256;stroke-dashoffset:256}
.seal-area.drawing .seal-rect-inner{animation:drawStroke .6s cubic-bezier(.4,0,.2,1) 1.0s forwards}
.seal-axes{opacity:0}
.seal-area.drawing .seal-axes{animation:fadeInEl .35s ease 1.4s forwards}
.seal-ring{stroke-dasharray:41;stroke-dashoffset:41}
.seal-area.drawing .seal-ring{animation:drawStroke .35s ease 1.55s forwards}
.seal-dot{transform-origin:100px 100px;transform:scale(0)}
.seal-area.drawing .seal-dot{animation:dotPop .28s cubic-bezier(.2,0,.2,1) 1.85s forwards}
@keyframes drawStroke{to{stroke-dashoffset:0}}
@keyframes fadeInEl{to{opacity:1}}
@keyframes dotPop{to{transform:scale(1)}}
/* Name row */
.name-area{display:flex;align-items:center;justify-content:center;font-family:var(--fg);font-weight:500;font-size:clamp(72px,9.5vw,120px);text-transform:uppercase;line-height:1;white-space:nowrap;letter-spacing:.04em}
.lw{display:block;overflow:hidden;max-width:1.2em;transition:max-width .52s cubic-bezier(.4,0,.2,1) .22s,opacity .22s ease 0s}
.lt{display:block;padding:0 .06em;opacity:0;color:var(--text);transition:opacity .28s ease}
.lw.visible .lt{opacity:1}
.lw.fade.dimmed .lt{opacity:.13}
.lw.collapse{max-width:0}
.lw.collapse .lt{opacity:0}
.lw.spacer{max-width:8em;display:flex;align-items:center;justify-content:center;transition:max-width .44s cubic-bezier(.4,0,.2,1) .04s,opacity .22s ease 0s}
.spacer-line{display:block;width:1px;height:.6em;background:var(--text-dim);opacity:0;flex-shrink:0;transition:opacity .5s ease}
.spacer-line.visible{opacity:.55}
/* Below area */
.below-area{position:relative;margin-top:32px;min-height:52px;width:100%;display:flex;align-items:flex-start;justify-content:center}
.labels-row{position:absolute;display:flex;gap:clamp(44px,6.5vw,88px);align-items:flex-start;opacity:0;transition:opacity .5s ease}
.labels-row.visible{opacity:1}
.word-label{display:flex;flex-direction:column;align-items:center;gap:5px}
.lbl-glyph{font-family:var(--fg);font-weight:400;font-size:clamp(17px,2.2vw,26px);color:#7aad97;opacity:.72;letter-spacing:.03em}
.lbl-meaning{font-family:var(--fm);font-weight:300;font-size:clamp(9px,1.1vw,13px);letter-spacing:.2em;text-transform:uppercase;color:var(--text-dim);opacity:.55}
.hero-tagline{position:absolute;font-family:var(--fg);font-style:italic;font-weight:300;font-size:clamp(16px,2vw,22px);color:var(--text-muted);letter-spacing:.01em;opacity:0;text-align:center;transition:opacity .6s ease}
.hero-tagline.visible{opacity:1}

/* Products grid */
.products-section{padding:5rem 0 6rem}
.section-head{display:flex;flex-direction:column;gap:1rem;margin-bottom:3rem}
.section-title{font-family:var(--fd);font-size:clamp(1.8rem,4vw,2.8rem);font-weight:500;line-height:1.15;color:var(--text)}
.section-sub{font-size:.95rem;line-height:1.7;color:var(--text-muted);max-width:56ch}
.products-grid{display:grid;grid-template-columns:1fr;gap:1.25rem}
@media(min-width:640px){.products-grid{grid-template-columns:1fr 1fr}}
@media(min-width:1024px){.products-grid{grid-template-columns:1fr 1fr 1fr;grid-template-rows:auto auto}}
@media(min-width:1024px){.product-card--featured{grid-column:span 2}}
/* Card */
.product-card{display:flex;flex-direction:column;gap:1rem;padding:1.75rem;border-radius:14px;border:1px solid var(--border);background:rgba(28,25,23,.5);cursor:pointer;transition:border-color .2s,background .2s,box-shadow .2s,transform .2s;position:relative;overflow:hidden}
.product-card::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at top left,var(--cg,transparent) 0%,transparent 70%);pointer-events:none;opacity:0;transition:opacity .3s}
.product-card:hover::before{opacity:1}
.product-card:hover{transform:translateY(-2px)}
.pc-sage{--cg:rgba(122,173,151,.08)}
.pc-sage:hover{border-color:rgba(122,173,151,.45);box-shadow:0 8px 40px -12px rgba(122,173,151,.25)}
.pc-teal{--cg:rgba(45,212,191,.08)}
.pc-teal:hover{border-color:rgba(45,212,191,.45);box-shadow:0 8px 40px -12px rgba(45,212,191,.25)}
.pc-amber{--cg:rgba(251,191,36,.08)}
.pc-amber:hover{border-color:rgba(251,191,36,.45);box-shadow:0 8px 40px -12px rgba(251,191,36,.2)}
.pc-violet{--cg:rgba(167,139,250,.08)}
.pc-violet:hover{border-color:rgba(167,139,250,.45);box-shadow:0 8px 40px -12px rgba(167,139,250,.2)}
.pc-fuchsia{--cg:rgba(232,121,249,.08)}
.pc-fuchsia:hover{border-color:rgba(232,121,249,.45);box-shadow:0 8px 40px -12px rgba(232,121,249,.2)}
.card-icon{width:40px;height:40px;display:flex;align-items:center;justify-content:center;border-radius:8px;background:rgba(255,255,255,.04);border:1px solid var(--border);color:var(--ic,var(--text-muted));flex-shrink:0}
.card-icon svg{width:20px;height:20px}
.card-title{font-family:var(--fd);font-size:1.1rem;font-weight:500;color:var(--text);line-height:1.3}
.product-card--featured .card-title{font-size:1.35rem}
.card-desc{font-size:.875rem;line-height:1.7;color:var(--text-muted);flex:1}
.card-tags{display:flex;flex-wrap:wrap;gap:.4rem}
.tag{font-family:var(--fm);font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;padding:.18rem .5rem;border-radius:4px;border:1px solid var(--border);color:var(--text-dim)}
.card-cta{font-family:var(--fm);font-size:.72rem;letter-spacing:.04em;color:var(--ic,var(--text-muted));display:flex;align-items:center;gap:.35rem;margin-top:.25rem}
.card-cta .arr{transition:transform .15s}
.product-card:hover .arr{transform:translateX(4px)}

/* Why section */
.why-section{padding:4rem 0;border-top:1px solid var(--border);border-bottom:1px solid var(--border)}
.why-grid{display:grid;grid-template-columns:1fr;gap:2rem}
@media(min-width:640px){.why-grid{grid-template-columns:1fr 1fr}}
@media(min-width:1024px){.why-grid{grid-template-columns:repeat(4,1fr)}}
.why-item{display:flex;flex-direction:column;gap:.85rem}
.why-icon{width:32px;height:32px;color:var(--sage);opacity:.8}
.why-icon svg{width:100%;height:100%}
.why-title{font-family:var(--fd);font-size:1rem;color:var(--text);margin-bottom:.2rem}
.why-body{font-size:.85rem;line-height:1.7;color:var(--text-muted)}
/* CTA banner */
.cta-section{padding:5rem 0}
.cta-inner{display:flex;flex-direction:column;gap:2rem;align-items:flex-start}
@media(min-width:768px){.cta-inner{flex-direction:row;align-items:center;justify-content:space-between}}
.cta-actions{display:flex;flex-wrap:wrap;gap:.75rem;flex-shrink:0}

/* ══════════════════════════════════════════════════════════════
   PRODUCT PAGES
══════════════════════════════════════════════════════════════ */
.product-hero{padding:5rem 0 3rem;border-bottom:1px solid var(--border)}
.breadcrumb{font-family:var(--fm);font-size:.72rem;color:var(--text-dim);cursor:pointer;transition:color .15s}
.breadcrumb:hover{color:var(--text-muted)}
.hero-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:2.5rem;flex-wrap:wrap;gap:1rem}
.hero-body{display:grid;grid-template-columns:1fr;gap:3rem;align-items:flex-start}
@media(min-width:900px){.hero-body{grid-template-columns:1fr 380px}}
.hero-h1{font-family:var(--fd);font-size:clamp(1.9rem,5vw,3rem);font-weight:500;line-height:1.15;color:var(--text);margin-bottom:1.25rem}
.hero-lead{font-size:1rem;line-height:1.75;color:var(--text-muted);max-width:56ch;margin-bottom:2rem}
.hero-actions{display:flex;flex-wrap:wrap;gap:.75rem}
/* Content sections */
.content-section{padding:4rem 0;border-top:1px solid var(--border)}
.two-col{display:grid;grid-template-columns:1fr;gap:3rem}
@media(min-width:768px){.two-col{grid-template-columns:1fr 1fr}}
.prose{font-size:.95rem;line-height:1.75;color:var(--text-muted);max-width:68ch}
.prose p+p{margin-top:1rem}

/* Quantum readiness */
.dial-card{background:rgba(28,25,23,.7);border:1px solid var(--border);border-radius:14px;padding:1.75rem}
.dial-label{font-family:var(--fm);font-size:.6rem;letter-spacing:.18em;text-transform:uppercase;color:var(--text-dim);margin-bottom:1rem}
.dial-rings{display:flex;justify-content:center;margin-bottom:1.5rem}
.dial-rings svg{width:120px;height:120px}
.dial-legend{display:flex;flex-direction:column;gap:.55rem}
.dial-row{display:flex;align-items:center;gap:.6rem}
.dial-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.dial-name{font-family:var(--fm);font-size:.66rem;color:var(--text-muted);flex:1}
.dial-score{font-family:var(--fm);font-size:.66rem;font-weight:600}

.deliver-list{display:flex;flex-direction:column;gap:1.25rem}
.deliver-item{display:flex;gap:.75rem;align-items:flex-start}
.deliver-icon{width:20px;height:20px;flex-shrink:0;margin-top:.15rem;color:var(--teal)}
.deliver-icon svg{width:100%;height:100%}
.deliver-title{font-size:.9rem;font-weight:500;color:var(--text);margin-bottom:.25rem}
.deliver-body{font-size:.82rem;line-height:1.6;color:var(--text-muted)}

.steps{display:flex;flex-direction:column;gap:1.25rem}
.step{display:flex;gap:1rem;align-items:flex-start}
.step-num{font-family:var(--fm);font-size:.62rem;color:var(--teal);opacity:.7;min-width:1.8rem;padding-top:.15rem}
.step-title{font-size:.9rem;font-weight:500;color:var(--text);margin-bottom:.2rem}
.step-body{font-size:.82rem;line-height:1.6;color:var(--text-muted)}

.areas-section{padding:4rem 0;border-top:1px solid var(--border)}
.areas-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:1rem}
.area-card{padding:1.25rem;border-radius:10px;border:1px solid rgba(255,255,255,.06);background:rgba(28,25,23,.5);transition:border-color .2s}
.area-code{font-family:var(--fm);font-size:.6rem;letter-spacing:.2em;margin-bottom:.5rem}
.area-name{font-family:var(--fd);font-size:.95rem;color:var(--text);margin-bottom:.5rem}
.area-desc{font-size:.78rem;line-height:1.6;color:var(--text-muted)}

/* Intake questionnaire */
.intake-section{padding:3rem 0 5rem;border-top:1px solid var(--border)}
.intake-intro{max-width:560px}
.intake-heading{font-size:clamp(1.5rem,3.5vw,2rem);font-weight:500;line-height:1.2;color:var(--text);margin-bottom:1rem}
.intake-lead{font-size:.9rem;line-height:1.75;color:var(--text-muted);margin-bottom:2rem;max-width:52ch}
.intake-start-btn{font-size:.8rem;padding:.8rem 1.75rem}

    }
    const FADE_IDS = [3,4,5,6,8,9]
    let timers = []
    function after(ms, fn) { timers.push(setTimeout(fn, ms)) }
    function g(id) { return document.getElementById('hv-'+id) }

    function run() {
      const sealArea = g('sealArea'), labelsRow = g('labelsRow')
      const tagline = g('tagline'), spacerLine = g('spacerLine')
      const spacer = g('spacer')
      // Phase 1: IREMIA
      for (let i = 0; i < 6; i++) {
        after(T.p1Start + i*T.p1Stagger, () => { const lw = g('l'+i); if(lw) lw.classList.add('visible') })
      }
      // Phase 2: IKIGAI + spacer divider
      for (let i = 0; i < 6; i++) {
        after(T.p2Start + i*T.p2Stagger, () => { const lw = g('l'+(6+i)); if(lw) lw.classList.add('visible') })
      }
      after(T.p2Start, () => { if(spacerLine) spacerLine.classList.add('visible') })
      // Labels in
      after(T.labelsIn, () => { if(labelsRow) labelsRow.classList.add('visible') })
      // Dim fading letters
      after(T.dimStart, () => { FADE_IDS.forEach(i => { const lw = g('l'+i); if(lw) lw.classList.add('dimmed') }) })
      // Collapse to IREKAI + labels fade simultaneously
      after(T.collapseStart, () => {
        if(spacerLine) spacerLine.classList.remove('visible')
        FADE_IDS.forEach(i => { const lw = g('l'+i); if(lw) lw.classList.add('collapse') })
        if(spacer) spacer.classList.add('collapse')
      })
      after(T.labelsFade, () => { if(labelsRow) labelsRow.classList.remove('visible') })
      // Seal appears and draws
      after(T.sealIn, () => {
        if(sealArea) { sealArea.classList.add('visible'); setTimeout(() => sealArea.classList.add('drawing'), 400) }

      // Tagline
      after(T.tagIn, () => { if(tagline) tagline.classList.add('visible') })

/* ──────────────────────────────────────────
   ROUTER & APP
──────────────────────────────────────────── */
const routes = [
  { path: '/',                              component: HomeView },
  { path: '/about',                         component: AboutView },
  { path: '/products/quantum-readiness',    component: QuantumReadinessView },
  { path: '/products/maturity-model',       component: MaturityModelView },
  { path: '/products/supplier-management',  component: SupplierManagementView },
  { path: '/products/code-scanning',        component: CodeScanningView },
]

const router = createRouter({
  history: createWebHashHistory(),
  routes,
  scrollBehavior(to, from, saved) {
    if (saved) return saved
    return { top: 0 }
  }
})

router.afterEach((to) => {
  const titles = {
    '/': 'IREKAI — Post-Quantum Security',
    '/about': 'About — IREKAI',
    '/products/quantum-readiness': 'Quantum Readiness — IREKAI',
    '/products/maturity-model': 'PQC Maturity Model — IREKAI',
    '/products/supplier-management': 'Supplier Management — IREKAI',
    '/products/code-scanning': 'Code Scanner — IREKAI',
  }
  document.title = titles[to.path] || 'IREKAI'
})

const App = {
  components: { NavBar, SiteFooter },
  template: `
<div class="grid-bg" style="min-height:100vh;display:flex;flex-direction:column">
  <NavBar/>
  <main style="flex:1">
    <router-view v-slot="{ Component }">
      <transition name="v" mode="out-in">
        <component :is="Component" :key="$route.path"/>
      </transition>
    </router-view>
  </main>
  <SiteFooter/>
</div>`
}

createApp(App).use(router).mount('#app')
</script>
